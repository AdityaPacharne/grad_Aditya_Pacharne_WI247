<!DOCTYPE html>
<html>
    <head>
        <title>WhiteRock Inc.</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <script>
            function setContent(html){
                document.getElementById("info").innerHTML = html;
            }

            function home(){
                setContent(`
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="card-title">Welcome to WhiteRock Inc.</h2>
                        <p class="card-text">Your trusted banking partner.</p>
                    </div>
                </div>
            `);
            }

            function about(){
                setContent(`
                <div class="card shadow">
                    <div class="card-body">
                        <h2>About Us</h2>
                        <p>We are a trusted financial institution providing reliable banking services.</p>
                    </div>
                </div>
            `);
            }

            function loanCalculator(){
                setContent(`
            <div class="card shadow">
                <div class="card-body">
                    <h2>Loan Calculator</h2>

                    <div class="mb-3">
                        <label class="form-label">Loan Amount</label>
                        <input type="number" id="loanAmt" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Interest Rate (%)</label>
                        <input type="number" id="loanRate" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Years</label>
                        <input type="number" id="loanYears" class="form-control">
                    </div>

                    <button class="btn btn-primary" onclick="calculateLoan()">Calculate</button>

                    <p class="mt-3 fw-bold" id="loanResult"></p>
                </div>
            </div>
            `);
            }

            function calculateLoan(){
                var p=document.getElementById("loanAmt").value;
                var r=document.getElementById("loanRate").value/100/12;
                var n=document.getElementById("loanYears").value*12;

                var emi=(p*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
                document.getElementById("loanResult").innerHTML="Monthly EMI: ₹ "+emi.toFixed(2);
            }

            function depositCalculator(){
                setContent(`
            <div class="card shadow">
                <div class="card-body">
                    <h2>Deposit Calculator</h2>

                    <div class="mb-3">
                        <label class="form-label">Amount</label>
                        <input type="number" id="depAmt" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Interest Rate (%)</label>
                        <input type="number" id="depRate" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Years</label>
                        <input type="number" id="depYears" class="form-control">
                    </div>

                    <button class="btn btn-success" onclick="calculateDeposit()">Calculate</button>

                    <p class="mt-3 fw-bold" id="depResult"></p>
                </div>
            </div>
            `);
            }

            function calculateDeposit(){
                var p=document.getElementById("depAmt").value;
                var r=document.getElementById("depRate").value/100;
                var t=document.getElementById("depYears").value;

                var total=p*Math.pow((1+r),t);
                document.getElementById("depResult").innerHTML="Maturity Amount: ₹ "+total.toFixed(2);
            }

            function accountOpening(){
                setContent(`
            <div class="card shadow">
                <div class="card-body">
                    <h2>Account Opening</h2>

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Account Type</label>
                        <select class="form-select">
                            <option>Savings</option>
                            <option>Current</option>
                        </select>
                    </div>

                    <button class="btn btn-primary">Submit</button>
                </div>
            </div>
            `);
            }

            function login(){
                setContent(`
            <div class="card shadow">
                <div class="card-body">
                    <h2>Login</h2>

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" id="loginUser" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="loginPass" class="form-control">
                    </div>

                    <button class="btn btn-dark" onclick="validateLogin()">Login</button>
                    <p class="mt-3" id="loginMsg"></p>
                </div>
            </div>
            `);
            }

            function validateLogin(){
                var u=document.getElementById("loginUser").value;
                var p=document.getElementById("loginPass").value;

                if(u=="" || p==""){
                    document.getElementById("loginMsg").innerHTML="<span class='text-danger'>All fields required</span>";
                }else{
                    document.getElementById("loginMsg").innerHTML="<span class='text-success'>Validation Successful</span>";
                }
            }

            function signup(){
                setContent(`
            <div class="card shadow">
                <div class="card-body">
                    <h2>Signup</h2>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="signEmail" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="signPass" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="signPass2" class="form-control">
                    </div>

                    <button class="btn btn-success" onclick="validateSignup()">Signup</button>
                    <p class="mt-3" id="signMsg"></p>
                </div>
            </div>
            `);
            }

            function validateSignup(){
                var email=document.getElementById("signEmail").value;
                var p1=document.getElementById("signPass").value;
                var p2=document.getElementById("signPass2").value;

                if(email=="" || p1=="" || p2==""){
                    document.getElementById("signMsg").innerHTML="<span class='text-danger'>All fields required</span>";
                }
                else if(p1!=p2){
                    document.getElementById("signMsg").innerHTML="<span class='text-danger'>Passwords do not match</span>";
                }
                else{
                    document.getElementById("signMsg").innerHTML="<span class='text-success'>Signup Successful</span>";
                }
            }
        </script>
    </head>

    <body onload="home()">

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="#">WhiteRock</a>

                <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">

                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="home()">Home</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="about()">About</a>
                        </li>

                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#">Services</a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#" onclick="loanCalculator()">Loan Calculator</a></li>
                                <li><a class="dropdown-item" href="#" onclick="depositCalculator()">Deposit Calculator</a></li>
                                <li><a class="dropdown-item" href="#" onclick="accountOpening()">Account Opening</a></li>
                            </ul>
                        </li>

                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#">Netbanking</a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#" onclick="login()">Login</a></li>
                                <li><a class="dropdown-item" href="#" onclick="signup()">Signup</a></li>
                            </ul>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>

        <div class="container my-5" id="info"></div>

        <footer class="bg-dark fixed-bottom text-white text-center py-3">
            © 2026 WhiteRock Inc.
        </footer>

    </body>
</html>
